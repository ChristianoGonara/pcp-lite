<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCP Lite · Login</title>
    <script src="../js/script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-body">
    <header id="header-login" class="header-login"></header>

    <main class="login-main">
        <div class="login-top-logo">
            <img class="login-logo-large" src="../img/logo_preto.png" alt="PCP Lite">
            <span class="login-logo-text">PCP Lite</span>
        </div>
        <section class="login-card" aria-label="Acesso">
            <h1 class="login-heading">Bem-vindo</h1>
            <p class="login-subheading">Entre com sua conta para continuar</p>

            <form id="form-login" class="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <input id="usuario" name="usuario" type="text" class="login-input" placeholder="Seu usuário" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" class="login-input" placeholder="Sua senha" required>
                </div>
                <div class="login-actions">
                    <label class="login-remember">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" class="login-forgot">Esqueci minha senha</a>
                    <a href="cadastro.html" class="login-forgot">Criar conta</a>
                </div>
                <button type="submit" class="login-button">Entrar</button>
            </form>
        </section>
    </main>

    <footer class="login-footer">
        <p>&copy; 2025 PCP Lite</p>
    </footer>
    <script src="../js/script/login.js" defer></script>
</body>
</html>
